name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Soroban contract tests
        run: cargo test --locked

      - name: Build contract WASM artifact
        run: cargo build --locked --target wasm32v1-none --release -p skill_sprint_ledger

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate frontend contract config
        run: npm run export:frontend

      - name: Build Vite frontend
        run: npm run build:web
        env:
          VITE_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          VITE_STELLAR_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
          VITE_CONTRACT_ID: CACOOTSVOLSTXCEIG7YJZAI7KYCWUQRVUPN5YE7OY33RP2F6OL5ZMJW2

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
